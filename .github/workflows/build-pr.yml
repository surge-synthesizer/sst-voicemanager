name: Build Tests

on:
  pull_request:
    branches:
      - main

jobs:
  build_feature:
    name: Test ${{matrix.name}}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux gcc12
            testExe: build/sst-voicemanager-test

          - os: ubuntu-latest
            name: linux clang21 rtsan
            installClang: true
            testExe: build/sst-voicemanager-test
            cmakeArgs: -DUSE_RTSAN=ON

          - os: macos-latest
            name: mac latest
            testExe: build/sst-voicemanager-test

          - os: windows-latest
            name: win latest
            testExe: build/Debug/sst-voicemanager-test.exe

    steps:

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: pick GCC12
        if: runner.os == 'Linux'
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 12
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 12

      - name: Setup RTSAN
        if: ${{ matrix.installClang }}
        uses: egor-tensin/setup-clang@v2
        with:
          version: 21
          platform: x64

      - name: Build test
        run: |
          cmake -S . -B ./build -DCMAKE_BUILD_TYPE=Debug -DSST_VOICEMANAGER_BUILD_TESTS=TRUE ${{ matrix.cmakeArgs }}
          cmake --build ./build --config Debug

      - name: Run test
        run: |
          ls ${{ matrix.testExe }}
          ${{ matrix.testExe }}


  build_test_docker:
    name: Test - Docker Ubuntu 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build in Docker
        uses: surge-synthesizer/sst-githubactions/cmake-in-docker@main
        with:
          image: ghcr.io/surge-synthesizer/sst-dockerimages/ubuntu20_gcc11:main
          username: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          cmakeArgs: -DCMAKE_BUILD_TYPE=Release -DSST_VOICEMANAGER_BUILD_TESTS=TRUE
          target: sst-voicemanager-test

      - name: Run Test
        run: |
          ls -l build
          ./build/sst-voicemanager-test
